<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — 7EBR</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .form-page { background: var(--bg); }
    .form-page::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(196,168,130,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .form-card { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div id="main-nav"></div>
  <div class="page form-page">
    <div class="form-card">
      <div class="form-logo">
        <img src="/logo.jpeg" alt="7EBR" onerror="this.style.display='none';document.getElementById('logo-text').style.display='block'">
        <div id="logo-text" class="form-logo-text" style="display:none">7EBR</div>
      </div>

      <h1 class="form-title">Connexion</h1>
      <p class="form-subtitle">Bienvenue, entrez vos informations</p>

      <div class="form-error" id="login-error"></div>
      <div class="form-success" id="login-success"></div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="login-email" placeholder="votre@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-input" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>

      <button class="form-btn" id="login-btn" onclick="handleLogin()">Se connecter</button>

      <div class="form-footer">
        Pas encore de compte ?
        <a href="/register.html">Créer un compte</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      renderNav();
      const user = await getUser();
      if (user) window.location.href = '/index.html';

      document.getElementById('login-password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleLogin();
      });
    });

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      const sucEl = document.getElementById('login-success');

      errEl.classList.remove('show');
      sucEl.classList.remove('show');

      if (!email || !password) {
        errEl.textContent = 'Veuillez remplir tous les champs.';
        errEl.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Connexion...';

      try {
        await login(email, password);
        sucEl.textContent = 'Connexion réussie! Redirection...';
        sucEl.classList.add('show');
        setTimeout(() => {
          const redirect = new URLSearchParams(window.location.search).get('redirect') || '/index.html';
          window.location.href = redirect;
        }, 800);
      } catch (err) {
        errEl.textContent = 'Email ou mot de passe incorrect.';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    }
  </script>
</body>
</html>
