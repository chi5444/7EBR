<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — 7EBR</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <div id="main-nav"></div>
  <div class="page form-page">
    <div class="form-card">
      <div class="form-logo">
        <img src="/logo.jpeg" alt="7EBR" onerror="this.style.display='none';document.getElementById('lt').style.display='block'">
        <div id="lt" class="form-logo-text" style="display:none">7EBR</div>
      </div>
      <h1 class="form-title">Connexion</h1>
      <p class="form-subtitle">Bienvenue, entrez vos informations</p>
      <div class="form-error" id="login-err"></div>
      <div class="form-success" id="login-ok"></div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="login-email" placeholder="votre@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-input" id="login-pw" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="form-btn" id="login-btn" onclick="handleLogin()">Se connecter</button>
      <div class="form-footer">
        Pas encore de compte ? <a href="/register.html">Créer un compte</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      renderNav();
      const user = await getUser();
      if (user) window.location.href = '/index.html';
      document.getElementById('login-pw').addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
      });
    });

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pw    = document.getElementById('login-pw').value;
      const err   = document.getElementById('login-err');
      const ok    = document.getElementById('login-ok');
      const btn   = document.getElementById('login-btn');
      err.classList.remove('show'); ok.classList.remove('show');

      if (!email || !pw) {
        err.textContent = 'Veuillez remplir tous les champs.';
        err.classList.add('show'); return;
      }
      btn.disabled = true; btn.textContent = 'Connexion...';
      try {
        await login(email, pw);
        ok.textContent = 'Connexion réussie! Redirection...';
        ok.classList.add('show');
        setTimeout(() => {
          const r = new URLSearchParams(window.location.search).get('redirect') || '/index.html';
          window.location.href = r;
        }, 800);
      } catch(e) {
        err.textContent = 'Email ou mot de passe incorrect.';
        err.classList.add('show');
        btn.disabled = false; btn.textContent = 'Se connecter';
      }
    }
  </script>
</body>
</html>
