<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Produit — 7EBR</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    /* ─────────────────────────────────────
       PRODUCT PAGE — Clean Pull Up style
    ───────────────────────────────────── */
    .product-page { background: var(--parchment); }

    /* BACK BAR */
    .back-bar {
      padding: 14px 20px;
      border-bottom: 1px solid var(--cream-dark);
      background: var(--cream-card);
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 7px;
      color: var(--ink-soft); text-decoration: none;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      transition: color var(--transition); font-family: 'Cairo', sans-serif;
    }
    .back-link:hover { color: var(--ink); }
    .back-link svg { width: 14px; height: 14px; }

    /* ── LAYOUT: image left / info right on desktop ── */
    .product-body {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      align-items: start;
    }
    @media (max-width: 768px) {
      .product-body { grid-template-columns: 1fr; }
    }

    /* ── IMAGE GALLERY ── */
    .product-gallery { position: sticky; top: var(--nav-h); }

    .gallery-main {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--cream-deep);
      overflow: hidden;
      position: relative;
    }
    .gallery-main img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: opacity 0.3s ease;
    }
    .gallery-main .img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: var(--cream-deep);
    }

    /* Badge on image */
    .img-badge {
      position: absolute; top: 14px; left: 14px;
      background: var(--ink); color: var(--cream);
      font-size: 9px; letter-spacing: 2px;
      text-transform: uppercase; padding: 5px 11px;
      font-family: 'Cairo', sans-serif; font-weight: 600;
      z-index: 2;
    }

    /* Thumbnails */
    .gallery-thumbs {
      display: flex;
      gap: 3px;
      padding: 3px;
      background: var(--cream-deep);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .gallery-thumbs::-webkit-scrollbar { display: none; }
    .gallery-thumb {
      width: 72px; height: 72px;
      flex-shrink: 0;
      cursor: pointer;
      opacity: 0.55;
      transition: opacity var(--transition);
      overflow: hidden;
      border: 2px solid transparent;
    }
    .gallery-thumb:hover { opacity: 0.85; }
    .gallery-thumb.active { opacity: 1; border-color: var(--ink); }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gallery-thumb .thumb-placeholder {
      width: 100%; height: 100%;
      background: var(--cream-card);
      display: flex; align-items: center; justify-content: center;
    }
    .gallery-thumb .thumb-placeholder svg { width: 22px; height: 22px; opacity: 0.3; color: var(--ink); }

    /* ── PRODUCT INFO ── */
    .product-info {
      padding: 28px 28px 40px;
      background: var(--parchment);
    }
    @media (max-width: 768px) { .product-info { padding: 22px 18px 32px; } }

    .product-category-tag {
      font-size: 10px; letter-spacing: 3px;
      text-transform: uppercase; color: var(--ink-faint);
      font-family: 'Cairo', sans-serif; margin-bottom: 10px;
    }
    .product-name-big {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 3.5vw, 32px);
      font-weight: 400; color: var(--ink);
      line-height: 1.2; margin-bottom: 14px;
    }
    .product-price-row {
      display: flex; align-items: baseline; gap: 12px;
      margin-bottom: 22px;
    }
    .product-price-big {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 500; color: var(--ink);
    }
    .product-old-price {
      font-size: 16px; color: var(--ink-ghost);
      text-decoration: line-through;
      font-family: 'Cormorant Garamond', serif;
    }

    .info-divider { height: 1px; background: var(--cream-dark); margin: 18px 0; }

    /* SIZE */
    .info-label {
      font-size: 11px; color: var(--ink-soft);
      margin-bottom: 10px; letter-spacing: 1px;
      font-family: 'Cairo', sans-serif; text-transform: uppercase;
    }
    .size-grid {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .size-btn {
      min-width: 52px; height: 52px; padding: 0 14px;
      border: 1.5px solid var(--cream-dark);
      background: var(--cream-card);
      color: var(--ink-mid);
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px; letter-spacing: 1px;
      cursor: pointer; transition: all var(--transition);
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
    }
    .size-btn:hover { border-color: var(--ink); color: var(--ink); }
    .size-btn.selected { background: var(--ink); color: var(--cream); border-color: var(--ink); }

    /* COLOR */
    .color-grid {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .color-btn {
      padding: 8px 16px;
      border: 1.5px solid var(--cream-dark);
      background: var(--cream-card);
      color: var(--ink-mid);
      font-family: 'Cairo', sans-serif;
      font-size: 11px; letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer; transition: all var(--transition);
      border-radius: 8px;
    }
    .color-btn:hover { border-color: var(--ink); color: var(--ink); }
    .color-btn.selected { background: var(--ink); color: var(--cream); border-color: var(--ink); }

    /* QTY + ADD */
    .add-row {
      display: flex; gap: 10px; margin-bottom: 10px;
    }
    .qty-control {
      display: flex; align-items: center;
      border: 1.5px solid var(--cream-dark);
      border-radius: 8px; overflow: hidden;
      background: var(--cream-card);
    }
    .qty-control button {
      background: none; border: none;
      width: 44px; height: 52px;
      cursor: pointer; color: var(--ink-soft);
      font-size: 18px; transition: color var(--transition);
      display: flex; align-items: center; justify-content: center;
    }
    .qty-control button:hover { color: var(--ink); }
    .qty-control span {
      font-size: 16px; min-width: 36px;
      text-align: center; color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
    }
    .add-cart-btn {
      flex: 1; background: var(--ink); color: var(--cream);
      border: none; border-radius: 8px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: all var(--transition);
      display: flex; align-items: center; justify-content: center;
      gap: 8px; height: 52px;
    }
    .add-cart-btn:hover { background: var(--ink-mid); }
    .add-cart-btn svg { width: 16px; height: 16px; }

    .buy-now-btn {
      width: 100%; background: var(--ink); color: var(--cream);
      border: none; border-radius: 8px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: all var(--transition);
      height: 52px; display: flex; align-items: center;
      justify-content: center; gap: 8px;
      text-decoration: none; margin-bottom: 10px;
    }
    .buy-now-btn:hover { background: var(--ink-mid); }

    .quick-btn {
      width: 100%; background: none; color: var(--ink);
      border: 1.5px solid var(--cream-dark); border-radius: 8px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: all var(--transition);
      height: 52px; display: flex; align-items: center;
      justify-content: center; gap: 8px; margin-bottom: 10px;
    }
    .quick-btn:hover { border-color: var(--ink); background: rgba(26,20,16,0.03); }
    .quick-btn svg { width: 16px; height: 16px; }

    .wa-btn {
      width: 100%; background: none; color: #2E7D45;
      border: 1.5px solid rgba(46,125,69,0.3); border-radius: 8px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: all var(--transition);
      height: 52px; display: flex; align-items: center;
      justify-content: center; gap: 8px; text-decoration: none;
      margin-bottom: 10px;
    }
    .wa-btn:hover { border-color: #2E7D45; background: rgba(46,125,69,0.04); }
    .wa-btn svg { width: 18px; height: 18px; }

    /* ── DELIVERY BOX ── */
    .delivery-box {
      background: var(--cream-card);
      border: 1px solid var(--cream-dark);
      border-radius: 6px;
      padding: 16px 18px;
      margin-top: 18px;
    }
    .delivery-row {
      display: flex; align-items: flex-start;
      gap: 14px; padding: 10px 0;
      border-bottom: 1px solid var(--cream-dark);
    }
    .delivery-row:last-child { border-bottom: none; padding-bottom: 0; }
    .delivery-row:first-child { padding-top: 0; }
    .delivery-icon {
      width: 34px; height: 34px; border-radius: 6px;
      background: rgba(26,20,16,0.06);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .delivery-icon svg { width: 16px; height: 16px; color: var(--ink); }
    .delivery-text-label {
      font-size: 12px; font-weight: 600; color: var(--ink);
      font-family: 'Cairo', sans-serif; letter-spacing: 0.5px;
    }
    .delivery-text-val {
      font-size: 13px; color: var(--ink-soft);
      font-family: 'Cormorant Garamond', serif;
      margin-top: 1px;
    }

    /* ── HIGHLIGHTS ── */
    .highlights-box {
      margin-top: 18px;
      background: var(--cream-card);
      border: 1px solid var(--cream-dark);
      border-radius: 6px;
      padding: 16px 18px;
    }
    .highlights-title {
      font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--ink);
      font-family: 'Cairo', sans-serif; margin-bottom: 12px;
    }
    .highlight-item {
      display: flex; align-items: center; gap: 10px;
      padding: 5px 0; font-size: 13px; color: var(--ink-soft);
      font-family: 'Cormorant Garamond', serif;
    }
    .highlight-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
    }

    /* OUT OF STOCK */
    .out-stock-bar {
      background: rgba(139,58,42,0.07);
      border: 1px solid rgba(139,58,42,0.18);
      color: var(--danger); padding: 11px 16px;
      font-size: 11px; letter-spacing: 2px;
      text-align: center; text-transform: uppercase;
      font-family: 'Cairo', sans-serif;
      margin-bottom: 14px; border-radius: var(--radius);
    }

    /* ── DESCRIPTION SECTION (below) ── */
    .product-lower {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 28px 40px;
      border-top: 1px solid var(--cream-dark);
      background: var(--parchment);
    }
    @media (max-width: 768px) { .product-lower { padding: 24px 18px 32px; } }
    .product-desc-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 400; color: var(--ink);
      margin-bottom: 12px;
    }
    .product-desc-text {
      font-size: 15px; line-height: 1.85; color: var(--ink-soft);
    }

    /* ── RELATED ── */
    .related-section {
      max-width: 1100px; margin: 0 auto;
      padding: 32px 24px 60px;
    }
    .related-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 400;
      color: var(--ink); margin-bottom: 20px;
    }
    .related-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px;
    }
    @media (min-width: 600px) { .related-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 900px) { .related-grid { grid-template-columns: repeat(4, 1fr); } }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(26,20,16,0.6);
      z-index: 3000;
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    @media (min-width: 600px) { .modal-overlay { align-items: center; justify-content: center; } }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--parchment);
      width: 100%; max-width: 520px;
      padding: 32px 24px 40px;
      position: relative;
      border-top: 3px solid var(--accent);
      max-height: 92vh; overflow-y: auto;
      transform: translateY(20px);
      transition: transform 0.25s ease;
      border-radius: 0;
    }
    @media (min-width: 600px) { .modal { border-radius: 4px; } }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-close {
      position: absolute; top: 12px; right: 12px;
      background: none; border: none; color: var(--ink-soft);
      cursor: pointer; padding: 6px;
    }
    .modal-close svg { width: 20px; height: 20px; }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; color: var(--ink); margin-bottom: 4px; }
    .modal-product-name { font-size: 13px; color: var(--accent-deep); margin-bottom: 22px; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 460px) { .modal-grid { grid-template-columns: 1fr; } }
    .modal-status { padding: 11px; font-size: 13px; text-align: center; margin-top: 12px; display: none; border-radius: 3px; }
    .modal-status.success { background: rgba(58,107,74,0.08); border: 1px solid rgba(58,107,74,0.25); color: var(--success); display: block; }
    .modal-status.error   { background: rgba(139,58,42,0.08); border: 1px solid rgba(139,58,42,0.25); color: var(--danger); display: block; }
  </style>
</head>
<body>
  <div id="main-nav"></div>

  <!-- QUICK ORDER MODAL -->
  <div class="modal-overlay" id="quick-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="modal-title">Commande Rapide</div>
      <div class="modal-product-name" id="modal-prod-name"></div>
      <div class="modal-grid">
        <div class="form-group">
          <label class="form-label">Prénom *</label>
          <input type="text" class="form-input" id="o-first" placeholder="Prénom"/>
        </div>
        <div class="form-group">
          <label class="form-label">Nom *</label>
          <input type="text" class="form-input" id="o-last" placeholder="Nom"/>
        </div>
        <div class="form-group">
          <label class="form-label">Téléphone *</label>
          <input type="tel" class="form-input" id="o-phone" placeholder="+216 XX XXX XXX"/>
        </div>
        <div class="form-group">
          <label class="form-label">Email *</label>
          <input type="email" class="form-input" id="o-email" placeholder="email@exemple.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">Gouvernorat *</label>
          <select class="form-input" id="o-gov">
            <option value="">Choisir...</option>
            <option>Tunis</option><option>Ariana</option><option>Ben Arous</option><option>Manouba</option>
            <option>Nabeul</option><option>Zaghouan</option><option>Bizerte</option><option>Béja</option>
            <option>Jendouba</option><option>Kef</option><option>Siliana</option><option>Sousse</option>
            <option>Monastir</option><option>Mahdia</option><option>Sfax</option><option>Kairouan</option>
            <option>Kasserine</option><option>Sidi Bouzid</option><option>Gabès</option><option>Médenine</option>
            <option>Tataouine</option><option>Gafsa</option><option>Tozeur</option><option>Kébili</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Adresse *</label>
          <input type="text" class="form-input" id="o-address" placeholder="Rue, ville..."/>
        </div>
        <div class="form-group">
          <label class="form-label">Taille *</label>
          <select class="form-input" id="o-size">
            <option value="">Choisir...</option>
            <option>XS</option><option>S</option><option>M</option>
            <option>L</option><option>XL</option><option>XXL</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Couleur *</label>
          <input type="text" class="form-input" id="o-color" placeholder="Noir, Blanc, Beige..."/>
        </div>
      </div>
      <button class="form-btn" id="send-order-btn" onclick="sendOrder()">
        Envoyer la commande
      </button>
      <div class="modal-status" id="modal-status"></div>
    </div>
  </div>

  <main class="page product-page">
    <div id="product-root">
      <div class="loading" style="padding:120px 24px;"><div class="spinner"></div>Chargement...</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init('wmDB05phl0j3DmALP');</script>
  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/products.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    let currentProduct = null;
    let selectedSize   = '';
    let selectedColor  = '';
    let qty            = 1;
    let currentImgIdx  = 0;
    const WHATSAPP     = '96672771';

    document.addEventListener('DOMContentLoaded', async () => {
      renderNav();
      const id = new URLSearchParams(window.location.search).get('id');
      if (!id) { window.location.href = '/index.html'; return; }
      try {
        currentProduct = await fetchProductById(id);
        document.title = currentProduct.title + ' — 7EBR';
        renderProduct(currentProduct);
        loadRelated(currentProduct.category, currentProduct.id);
      } catch(e) {
        document.getElementById('product-root').innerHTML =
          '<div class="empty-state"><p>Produit introuvable.</p></div>';
      }
    });

    /* ── RENDER ── */
    function renderProduct(p) {
      const root    = document.getElementById('product-root');
      const badge   = p.badge    ? `<div class="img-badge">${p.badge}</div>` : '';
      const oldPr   = p.old_price ? `<span class="product-old-price">${p.old_price} TND</span>` : '';
      const images  = p.images   || [];
      const colors  = p.colors   || [];

      /* main image */
      const mainImgHtml = images.length
        ? `<img id="main-img" src="${images[0]}" alt="${p.title}" onerror="this.src=''">`
        : `<div class="img-placeholder">${placeholderSVG()}</div>`;

      /* thumbnails */
      const thumbsHtml = images.length > 1
        ? `<div class="gallery-thumbs">${images.map((src, i) => `
            <div class="gallery-thumb ${i===0?'active':''}" data-idx="${i}" onclick="switchImg(${i})">
              <img src="${src}" alt="" onerror="this.parentElement.innerHTML='<div class=thumb-placeholder><svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1&quot;><rect x=&quot;3&quot; y=&quot;3&quot; width=&quot;18&quot; height=&quot;18&quot;/></svg></div>'">
            </div>`).join('')}
          </div>` : '';

      /* sizes */
      const sizesHtml = `
        <div class="info-label">Taille</div>
        <div class="size-grid">
          ${['XS','S','M','L','XL','XXL'].map(s =>
            `<button class="size-btn" data-size="${s}" onclick="selectSize('${s}')">${s}</button>`
          ).join('')}
        </div>`;

      /* colors */
      const colorsHtml = colors.length ? `
        <div class="info-label">Couleur</div>
        <div class="color-grid">
          ${colors.map(c =>
            `<button class="color-btn" data-color="${c}" onclick="selectColor('${c}')">${c}</button>`
          ).join('')}
        </div>` : '';

      const outStock = !p.in_stock
        ? `<div class="out-stock-bar">Rupture de stock</div>` : '';

      root.innerHTML = `
        <!-- BACK -->
        <div class="back-bar">
          <a href="/index.html" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
            Retour
          </a>
        </div>

        <!-- BODY -->
        <div class="product-body">

          <!-- GALLERY -->
          <div class="product-gallery">
            <div class="gallery-main">
              ${badge}
              ${mainImgHtml}
            </div>
            ${thumbsHtml}
          </div>

          <!-- INFO -->
          <div class="product-info">
            <div class="product-category-tag">${p.category || 'Collection'}</div>
            <h1 class="product-name-big">${p.title}</h1>
            <div class="product-price-row">
              ${oldPr}
              <span class="product-price-big">${p.price} TND</span>
            </div>

            ${outStock}

            ${p.in_stock ? `
            <div class="info-divider"></div>

            ${sizesHtml}
            ${colorsHtml}

            <!-- ADD TO CART -->
            <div class="add-row">
              <div class="qty-control">
                <button onclick="changeQty(-1)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <span id="qty-display">1</span>
                <button onclick="changeQty(1)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
              </div>
              <button class="add-cart-btn" onclick="handleAddToCart()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                Add to cart
              </button>
            </div>

    /* ── Gallery switch ── */
    function switchImg(idx) {
      currentImgIdx = idx;
      const images = currentProduct?.images || [];
      const main   = document.getElementById('main-img');
      if (main && images[idx]) main.src = images[idx];
      document.querySelectorAll('.gallery-thumb').forEach(t =>
        t.classList.toggle('active', parseInt(t.dataset.idx) === idx));
    }

    /* ── Selectors ── */
    function selectSize(s) {
      selectedSize = s;
      document.querySelectorAll('.size-btn').forEach(b =>
        b.classList.toggle('selected', b.dataset.size === s));
    }
    function selectColor(c) {
      selectedColor = c;
      document.querySelectorAll('.color-btn').forEach(b =>
        b.classList.toggle('selected', b.dataset.color === c));
    }
    function changeQty(d) {
      qty = Math.max(1, qty + d);
      const el = document.getElementById('qty-display');
      if (el) el.textContent = qty;
    }

    /* ── Cart actions ── */
    function handleAddToCart() {
      if (!selectedSize) { alert('Veuillez choisir une taille.'); return; }
      for (let i = 0; i < qty; i++) addToCart(currentProduct, selectedSize);
      openCart();
    }
    function handleBuyNow() {
      if (!selectedSize) { alert('Veuillez choisir une taille.'); return; }
      addToCart(currentProduct, selectedSize);
      window.location.href = '/checkout.html';
    }

    /* ── WhatsApp ── */
    function buildWA(p) {
      const msg = encodeURIComponent(
        `Bonjour 7EBR,\n\nJe voudrais commander :\n*${p.title}*\nPrix : ${p.price} TND\n\nTaille : \nCouleur : \nNom : \nAdresse : `
      );
      return `https://wa.me/${WHATSAPP}?text=${msg}`;
    }

    /* ── Modal ── */
    function openModal() {
      document.getElementById('modal-prod-name').textContent = currentProduct?.title || '';
      if (selectedSize)  document.getElementById('o-size').value  = selectedSize;
      if (selectedColor) document.getElementById('o-color').value = selectedColor;
      document.getElementById('quick-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      document.getElementById('quick-modal').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('quick-modal').addEventListener('click', e => {
        if (e.target === document.getElementById('quick-modal')) closeModal();
      });
    });

    /* ── Send order via EmailJS ── */
    async function sendOrder() {
      const first   = document.getElementById('o-first').value.trim();
      const last    = document.getElementById('o-last').value.trim();
      const phone   = document.getElementById('o-phone').value.trim();
      const email   = document.getElementById('o-email').value.trim();
      const gov     = document.getElementById('o-gov').value;
      const address = document.getElementById('o-address').value.trim();
      const size    = document.getElementById('o-size').value;
      const color   = document.getElementById('o-color').value.trim();
      const status  = document.getElementById('modal-status');
      status.className = 'modal-status';

      if (!first||!last||!phone||!email||!gov||!size) {
        status.className = 'modal-status error';
        status.textContent = 'Veuillez remplir tous les champs obligatoires.';
        return;
      }
      const btn = document.getElementById('send-order-btn');
      btn.disabled = true; btn.textContent = 'Envoi en cours...';
      try {
        await emailjs.send('service_lixuoem', 'template_y0aocqa', {
          customer_name:    first + ' ' + last,
          customer_phone:   phone,
          customer_email:   email,
          customer_city:    gov,
          customer_address: address,
          product_name:     currentProduct?.title || '',
          product_price:    currentProduct?.price + ' TND' || '',
          product_size:     size,
          product_color:    color || 'Non spécifié',
          to_email:         'admin@7ebr.com'
        });
        status.className = 'modal-status success';
        status.textContent = 'Commande envoyée! Nous vous contacterons bientôt.';
        ['o-first','o-last','o-phone','o-email','o-gov','o-address','o-size','o-color']
          .forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
      } catch(err) {
        status.className = 'modal-status error';
        status.textContent = 'Erreur. Contactez-nous sur WhatsApp.';
        console.error(err);
      } finally {
        btn.disabled = false; btn.textContent = 'Envoyer la commande';
      }
    }

    /* ── Related products ── */
    async function loadRelated(category, excludeId) {
      try {
        const all     = await fetchProducts({ category });
        const grid    = document.getElementById('related-grid');
        if (!grid) return;
        const related = all.filter(p => p.id != excludeId).slice(0, 4);
        grid.innerHTML = related.length
          ? related.map(renderProductCard).join('')
          : '<p style="color:var(--ink-faint);font-size:13px;grid-column:1/-1;">Aucun produit similaire.</p>';
      } catch(e) { console.error(e); }
    }

    }
