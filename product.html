<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Produit — 7EBR</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .product-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 24px 100px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: start;
    }
    @media (max-width: 768px) {
      .product-page { grid-template-columns: 1fr; gap: 0; padding: 0 0 80px; }
    }

    /* GALLERY */
    .product-gallery {
      position: sticky;
      top: calc(var(--nav-h) + 24px);
    }
    @media (max-width: 768px) { .product-gallery { position: static; } }

    .product-main-img {
      aspect-ratio: 3/4;
      background: var(--bg2);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .product-main-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .product-main-img .placeholder-svg { width: 60%; height: 60%; opacity: 0.3; }
    .product-badge-big {
      position: absolute;
      top: 16px; left: 16px;
      background: var(--ink);
      color: var(--bg);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 12px;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      z-index: 2;
    }

    /* INFO */
    .product-info {
      padding: 24px 24px 0;
    }
    @media (min-width: 769px) { .product-info { padding: 8px 0 0; } }

    .product-category {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-bottom: 12px;
      font-family: 'Cairo', sans-serif;
    }
    .product-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 20px;
    }
    .product-prices {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 28px;
    }
    .product-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      color: var(--ink);
    }
    .product-old-price {
      font-size: 18px;
      color: var(--text-faint);
      text-decoration: line-through;
    }

    .product-divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .product-desc {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-dim);
      margin-bottom: 28px;
    }

    /* SIZE SELECTOR — like reference image */
    .size-label {
      font-size: 13px;
      color: var(--text);
      margin-bottom: 12px;
      font-family: 'Cairo', sans-serif;
      letter-spacing: 1px;
    }
    .size-grid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .size-btn {
      min-width: 52px;
      height: 52px;
      padding: 0 12px;
      border: 1.5px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
    }
    .size-btn:hover { border-color: var(--ink); color: var(--ink); }
    .size-btn.selected {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    /* QTY ROW */
    .qty-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .qty-control {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .qty-ctrl-btn {
      background: none;
      border: none;
      color: var(--text);
      width: 44px; height: 44px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--transition);
    }
    .qty-ctrl-btn:hover { color: var(--ink); }
    .qty-display {
      min-width: 40px;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      color: var(--text);
    }

    /* ACTION BUTTONS */
    .action-buttons { display: flex; flex-direction: column; gap: 10px; }
    .btn-primary {
      width: 100%;
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 16px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 10px;
    }
    .btn-primary:hover { background: var(--ink); color: var(--bg); }
    .btn-primary svg { width: 18px; height: 18px; }

    .btn-secondary {
      width: 100%;
      background: none;
      color: var(--text);
      border: 1.5px solid var(--border);
      padding: 16px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      border-radius: 10px;
    }
    .btn-secondary:hover { border-color: var(--ink); color: var(--ink); }
    .btn-secondary svg { width: 18px; height: 18px; }
    .btn-whatsapp { border-color: rgba(37,211,102,0.4); color: #25d366; }
    .btn-whatsapp:hover { border-color: #25d366; background: rgba(37,211,102,0.05); }

    /* PRODUCT META */
    .product-meta {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .meta-row svg { width: 16px; height: 16px; color: var(--ink-dim); flex-shrink: 0; }

    /* QUICK ORDER MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
    }
    @media (min-width: 640px) {
      .modal-overlay { align-items: center; padding: 24px; }
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-bottom: none;
      width: 100%;
      max-width: 480px;
      padding: 32px 28px 40px;
      position: relative;
      transform: translateY(40px);
      transition: transform var(--transition);
      border-radius: 16px 16px 0 0;
      max-height: 90vh;
      overflow-y: auto;
    }
    @media (min-width: 640px) {
      .modal { border-bottom: 1px solid var(--border); border-radius: 0; transform: translateY(24px); max-height: none; }
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--ink), transparent);
      border-radius: 16px 16px 0 0;
    }
    .modal-close {
      position: absolute;
      top: 16px; right: 16px;
      background: none; border: none;
      color: var(--text-dim);
      cursor: pointer; padding: 4px;
    }
    .modal-close svg { width: 20px; height: 20px; }
    .modal h3 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 6px;
    }
    .modal-subtitle { font-size: 13px; color: var(--ink); margin-bottom: 24px; letter-spacing: 1px; }
    .modal-status {
      padding: 12px;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      display: none;
      border-radius: var(--radius);
    }
    .modal-status.success { background: rgba(39,174,96,0.1); border: 1px solid rgba(39,174,96,0.3); color: #2ecc71; display: block; }
    .modal-status.error { background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3); color: #e74c3c; display: block; }

    /* BACK LINK */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 1px;
      margin-bottom: 32px;
      transition: color var(--transition);
      font-family: 'Cairo', sans-serif;
    }
    .back-link:hover { color: var(--ink); }
    .back-link svg { width: 16px; height: 16px; }

    /* YOU MAY ALSO LIKE */
    .related-section {
      max-width: 1100px;
      margin: 60px auto 0;
      padding: 0 24px 80px;
    }
    .related-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 28px;
    }
    .related-title em { color: var(--ink); font-style: italic; }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 2px;
    }
  </style>
</head>
<body>
  <div id="main-nav"></div>

  <!-- QUICK ORDER MODAL -->
  <div class="modal-overlay" id="quick-order-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h3>Commander</h3>
      <p class="modal-subtitle" id="modal-product-name">—</p>

      <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="form-group">
          <label class="form-label">Prénom *</label>
          <input type="text" class="form-input" id="order-firstname" placeholder="Prénom"/>
        </div>
        <div class="form-group">
          <label class="form-label">Nom *</label>
          <input type="text" class="form-input" id="order-lastname" placeholder="Nom"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Téléphone *</label>
        <input type="tel" class="form-input" id="order-phone" placeholder="+216 XX XXX XXX"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input type="email" class="form-input" id="order-email" placeholder="votre@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Adresse *</label>
        <input type="text" class="form-input" id="order-address" placeholder="Rue, numéro..."/>
      </div>
      <div class="form-group">
        <label class="form-label">Gouvernorat *</label>
        <select class="form-input" id="order-gov">
          <option value="">Choisir...</option>
          <option>Tunis</option><option>Ariana</option><option>Ben Arous</option>
          <option>Manouba</option><option>Nabeul</option><option>Zaghouan</option>
          <option>Bizerte</option><option>Béja</option><option>Jendouba</option>
          <option>Kef</option><option>Siliana</option><option>Sousse</option>
          <option>Monastir</option><option>Mahdia</option><option>Sfax</option>
          <option>Kairouan</option><option>Kasserine</option><option>Sidi Bouzid</option>
          <option>Gabès</option><option>Médenine</option><option>Tataouine</option>
          <option>Gafsa</option><option>Tozeur</option><option>Kébili</option>
        </select>
      </div>
      <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="form-group">
          <label class="form-label">Taille *</label>
          <select class="form-input" id="order-size">
            <option value="">Taille</option>
            <option>XS</option><option>S</option><option>M</option>
            <option>L</option><option>XL</option><option>XXL</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Couleur</label>
          <input type="text" class="form-input" id="order-color" placeholder="ex: Noir"/>
        </div>
      </div>

      <button class="btn-primary" onclick="sendQuickOrder()" id="send-order-btn" style="border-radius:10px; background:var(--ink); color:var(--bg); margin-top:4px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Confirmer la commande
      </button>
      <div class="modal-status" id="modal-status"></div>
    </div>
  </div>

  <main class="page">
    <div style="max-width:1100px; margin:0 auto; padding:32px 24px 0;">
      <a href="/index.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
        Retour
      </a>
    </div>

    <div class="product-page" id="product-content">
      <div class="loading" style="grid-column:1/-1;">
        <div class="spinner"></div>Chargement...
      </div>
    </div>

    <!-- YOU MAY ALSO LIKE -->
    <div class="related-section" id="related-section" style="display:none;">
      <h2 class="related-title">Vous aimerez <em>aussi</em></h2>
      <div class="related-grid" id="related-grid"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    emailjs.init('wmDB05phl0j3DmALP');
  </script>
  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/products.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    let currentProduct = null;
    let selectedSize = '';
    let qty = 1;
    const WHATSAPP_NUMBER = '21696672771';

    document.addEventListener('DOMContentLoaded', async () => {
      renderNav();
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) { window.location.href = '/index.html'; return; }

      try {
        currentProduct = await fetchProductById(id);
        renderProduct(currentProduct);
        document.title = `${currentProduct.title} — 7EBR`;
        loadRelated(currentProduct.category, currentProduct.id);
      } catch (e) {
        document.getElementById('product-content').innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <p>Produit introuvable.</p>
          </div>`;
      }
    });

    function renderProduct(p) {
      const container = document.getElementById('product-content');
      const badge = p.badge ? `<div class="product-badge-big">${p.badge}</div>` : '';
      const oldPrice = p.old_price ? `<span class="product-old-price">${p.old_price} TND</span>` : '';
      
      // Image or placeholder
      const imgContent = p.image_url 
        ? `<img src="${p.image_url}" alt="${p.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"/><div class="placeholder-svg" style="display:none; width:100%; height:100%; align-items:center; justify-content:center;"><svg viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="120" height="160" fill="#1a1a1a"/><path d="M30 120 L60 40 L90 120 Z" stroke="#C4A882" stroke-width="1" fill="none" opacity="0.4"/><circle cx="60" cy="36" r="6" fill="none" stroke="#C4A882" stroke-width="1" opacity="0.4"/><text x="60" y="148" font-family="serif" font-size="10" fill="#C4A882" text-anchor="middle" opacity="0.3">7EBR</text></svg></div>`
        : `<svg class="placeholder-svg" viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="120" height="160" fill="#1a1a1a"/><path d="M30 120 L60 40 L90 120 Z" stroke="#C4A882" stroke-width="1" fill="none" opacity="0.4"/><circle cx="60" cy="36" r="6" fill="none" stroke="#C4A882" stroke-width="1" opacity="0.4"/><text x="60" y="148" font-family="serif" font-size="10" fill="#C4A882" text-anchor="middle" opacity="0.3">7EBR</text></svg>`;

      container.innerHTML = `
        <!-- GALLERY -->
        <div class="product-gallery">
          <div class="product-main-img">
            ${badge}
            ${imgContent}
          </div>
        </div>

        <!-- INFO -->
        <div class="product-info">
          <div class="product-category">${p.category || 'Collection'}</div>
          <h1 class="product-name">${p.title}</h1>
          <div class="product-prices">
            ${oldPrice}
            <span class="product-price">${p.price} TND</span>
          </div>

          <p class="product-desc">
            ${p.description || `Pièce exclusive de la collection 7EBR, inspirée de la calligraphie islamique traditionnelle. Coupe moderne, tissu premium, finition soignée.`}
          </p>

          <!-- SIZES -->
          <div class="size-label">Taille</div>
          <div class="size-grid">
            ${['XS','S','M','L','XL','XXL'].map(s => `
              <button class="size-btn" data-size="${s}" onclick="selectSize('${s}')">${s}</button>
            `).join('')}
          </div>

          ${p.in_stock ? `
          <!-- QTY -->
          <div class="qty-row">
            <div class="qty-control">
              <button class="qty-ctrl-btn" onclick="changeQty(-1)">−</button>
              <span class="qty-display" id="qty-display">1</span>
              <button class="qty-ctrl-btn" onclick="changeQty(1)">+</button>
            </div>
          </div>

          <!-- ACTIONS -->
          <div class="action-buttons">
            <button class="btn-primary" onclick="handleAddToCart()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
              Ajouter au panier
            </button>
            <button class="btn-secondary" onclick="openQuickOrder()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              Commander maintenant
            </button>
            <a class="btn-secondary btn-whatsapp" href="${buildWhatsApp(p)}" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.999 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.167L2 22l4.985-1.399A9.953 9.953 0 0 0 12 22c5.523 0 10-4.477 10-10S17.523 2 11.999 2zm.001 18a7.962 7.962 0 0 1-4.064-1.112l-.292-.173-3.017.847.857-2.94-.191-.302A7.947 7.947 0 0 1 4 12c0-4.411 3.589-8 8-8s8 3.589 8 8-3.588 8-8 8z"/></svg>
              Commander sur WhatsApp
            </a>
          </div>
          ` : `<div style="background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.2);color:#e74c3c;padding:12px 16px;font-size:13px;letter-spacing:1px;text-align:center;text-transform:uppercase;font-family:'Cairo',sans-serif;">Rupture de stock</div>`}

          <!-- META -->
          <div class="product-meta">
            <div class="meta-row">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
              Livraison dans toute la Tunisie — 8 TND
            </div>
            <div class="meta-row">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              Paiement à la livraison
            </div>
            <div class="meta-row">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
              Échange facile sous 7 jours
            </div>
          </div>
        </div>
      `;
    }

    function selectSize(s) {
      selectedSize = s;
      document.querySelectorAll('.size-btn').forEach(b => {
        b.classList.toggle('selected', b.dataset.size === s);
      });
    }

    function changeQty(delta) {
      qty = Math.max(1, qty + delta);
      const el = document.getElementById('qty-display');
      if (el) el.textContent = qty;
    }

    function handleAddToCart() {
      if (!selectedSize) {
        alert('Veuillez choisir une taille.');
        return;
      }
      for (let i = 0; i < qty; i++) addToCart(currentProduct, selectedSize);
      openCart();
    }

    function buildWhatsApp(p) {
      const msg = encodeURIComponent(`Bonjour 7EBR 👋\nJe voudrais commander:\n*${p.title}*\nPrix: ${p.price} TND\n\nTaille: \nNom: \nAdresse: `);
      return `https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`;
    }

    function openQuickOrder() {
      document.getElementById('modal-product-name').textContent = currentProduct?.title || '';
      if (selectedSize) document.getElementById('order-size').value = selectedSize;
      document.getElementById('quick-order-modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('quick-order-modal').classList.remove('open');
    }

    async function sendQuickOrder() {
      const firstname = document.getElementById('order-firstname').value.trim();
      const lastname = document.getElementById('order-lastname').value.trim();
      const phone = document.getElementById('order-phone').value.trim();
      const email = document.getElementById('order-email').value.trim();
      const address = document.getElementById('order-address').value.trim();
      const gov = document.getElementById('order-gov').value;
      const size = document.getElementById('order-size').value;
      const color = document.getElementById('order-color').value.trim();
      const statusEl = document.getElementById('modal-status');

      if (!firstname || !lastname || !phone || !email || !address || !gov || !size) {
        statusEl.className = 'modal-status error';
        statusEl.textContent = 'Veuillez remplir tous les champs obligatoires.';
        return;
      }

      const btn = document.getElementById('send-order-btn');
      btn.disabled = true;
      btn.textContent = 'Envoi en cours...';
      statusEl.className = 'modal-status';

      try {
        await emailjs.send('service_lixuoem', 'template_y0aocqa', {
          customer_name: firstname + ' ' + lastname,
          customer_phone: phone,
          customer_email: email,
          customer_address: address,
          customer_gov: gov,
          product_name: currentProduct?.title || '',
          product_price: currentProduct?.price + ' TND' || '',
          product_size: size,
          product_color: color || 'Non spécifié',
          to_email: 'admin@7ebr.com'
        });

        // Also save to Supabase
        try {
          await sb.from('orders').insert([{
            product_id: currentProduct?.id,
            product_title: currentProduct?.title,
            amount: (currentProduct?.price || 0) + 8,
            status: 'pending',
            customer_name: firstname + ' ' + lastname,
            customer_email: email,
            customer_phone: phone,
            address: `${address}, ${gov}`,
            payment_method: 'cod'
          }]);
        } catch(e) {}

        statusEl.className = 'modal-status success';
        statusEl.textContent = '✓ Commande envoyée! Nous vous contacterons bientôt.';
        ['order-firstname','order-lastname','order-phone','order-email','order-address','order-color'].forEach(id => {
          document.getElementById(id).value = '';
        });
        document.getElementById('order-gov').value = '';
        document.getElementById('order-size').value = '';
      } catch (err) {
        statusEl.className = 'modal-status error';
        statusEl.textContent = 'Erreur d\'envoi. Contactez-nous sur WhatsApp.';
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Confirmer la commande';
      }
    }

    async function loadRelated(category, excludeId) {
      try {
        const { data } = await sb.from('products').select('*').eq('category', category).eq('in_stock', true).neq('id', excludeId).limit(4);
        if (data && data.length > 0) {
          document.getElementById('related-section').style.display = 'block';
          document.getElementById('related-grid').innerHTML = data.map(renderProductCard).join('');
        }
      } catch(e) {}
    }

    document.getElementById('quick-order-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('quick-order-modal')) closeModal();
    });
  </script>
</body>
</html>
