<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8"/>

  <!-- Mobile -->
  <meta name="theme-color" content="#EDE5D8"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>

  <meta name="apple-mobile-web-app-title" content="7EBR"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .product-page { background: var(--parchment); }

    /* BACK */
    .back-bar { padding:13px 20px; border-bottom:1px solid var(--cream-dark); background:var(--cream-card); }
    .back-link { display:inline-flex; align-items:center; gap:7px; color:var(--ink-soft); text-decoration:none; font-size:11px; letter-spacing:2px; text-transform:uppercase; transition:color var(--transition); font-family:'Cairo',sans-serif; }
    .back-link:hover { color:var(--ink); }
    .back-link svg { width:14px; height:14px; }

    /* LAYOUT */
    .product-body {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: start;   /* KEY: lets sticky work */
    }
    @media(max-width:768px){
      .product-body { grid-template-columns: 1fr; }
    }

    /* GALLERY — sticky on desktop, normal on mobile */
    .product-gallery {
      position: sticky;
      top: calc(var(--nav-h) + 40px); /* nav + announce bar */
      align-self: start;              /* must be start for sticky in grid */
    }
    @media(max-width:768px){
      .product-gallery {
        position: static; /* normal flow on mobile */
      }
    }
    .gallery-main { width:100%; aspect-ratio:1/1; background:var(--cream-deep); overflow:hidden; position:relative; }
    .gallery-main img { width:100%; height:100%; object-fit:cover; display:block; transition: opacity 0.25s ease; }
    .gallery-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:var(--cream-deep); }
    .img-badge { position:absolute; top:14px; left:14px; background:var(--ink); color:var(--cream); font-size:9px; letter-spacing:2px; text-transform:uppercase; padding:5px 11px; font-family:'Cairo',sans-serif; font-weight:600; z-index:2; }
    .gallery-thumbs { display:flex; gap:3px; padding:3px; background:var(--cream-deep); overflow-x:auto; scrollbar-width:none; }
    .gallery-thumbs::-webkit-scrollbar { display:none; }
    .gallery-thumb { width:70px; height:70px; flex-shrink:0; cursor:pointer; opacity:0.55; transition:opacity var(--transition); overflow:hidden; border:2px solid transparent; }
    .gallery-thumb:hover { opacity:0.85; }
    .gallery-thumb.active { opacity:1; border-color:var(--ink); }
    .gallery-thumb img { width:100%; height:100%; object-fit:cover; display:block; }

    /* INFO */
    .product-info { padding:26px 26px 40px; background:var(--parchment); }
    @media(max-width:768px){ .product-info { padding:20px 16px 32px; } }
    .product-cat-tag { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--ink-faint); font-family:'Cairo',sans-serif; margin-bottom:9px; }
    .product-name-h1 { font-family:'Playfair Display',serif; font-size:clamp(22px,3.5vw,32px); font-weight:400; color:var(--ink); line-height:1.2; margin-bottom:13px; }
    .price-row { display:flex; align-items:baseline; gap:12px; margin-bottom:20px; }
    .price-main { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:500; color:var(--ink); }
    .price-old  { font-family:'Cormorant Garamond',serif; font-size:16px; color:var(--ink-ghost); text-decoration:line-through; }
    .info-sep   { height:1px; background:var(--cream-dark); margin:16px 0; }
    .sel-label  { font-size:11px; color:var(--ink-soft); margin-bottom:9px; font-family:'Cairo',sans-serif; text-transform:uppercase; letter-spacing:1px; }

    /* SIZE */
    .size-grid  { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
    .size-btn   { min-width:50px; height:50px; padding:0 13px; border:1.5px solid var(--cream-dark); background:var(--cream-card); color:var(--ink-mid); font-family:'Cormorant Garamond',serif; font-size:14px; cursor:pointer; transition:all var(--transition); display:flex; align-items:center; justify-content:center; border-radius:7px; }
    .size-btn:hover  { border-color:var(--ink); color:var(--ink); }
    .size-btn.active { background:var(--ink); color:var(--cream); border-color:var(--ink); }

    /* COLOR */
    .color-grid { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
    .color-btn  { padding:8px 15px; border:1.5px solid var(--cream-dark); background:var(--cream-card); color:var(--ink-mid); font-family:'Cairo',sans-serif; font-size:11px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all var(--transition); border-radius:7px; }
    .color-btn:hover  { border-color:var(--ink); color:var(--ink); }
    .color-btn.active { background:var(--ink); color:var(--cream); border-color:var(--ink); }

    /* ERROR */
    .sel-error { background:rgba(139,58,42,0.08); border:1px solid rgba(139,58,42,0.25); color:var(--danger); padding:9px 12px; font-size:12px; border-radius:3px; margin-bottom:12px; display:none; font-family:'Cairo',sans-serif; }
    .sel-error.show { display:block; }

    /* QTY + ADD */
    .add-row { display:flex; gap:10px; margin-bottom:10px; }
    .qty-ctrl { display:flex; align-items:center; border:1.5px solid var(--cream-dark); border-radius:7px; overflow:hidden; background:var(--cream-card); height:50px; }
    .qty-ctrl button {
      background: none; border: none;
      width: 46px; height: 50px;
      cursor: pointer; color: var(--ink);
      font-size: 22px; font-weight: 300;
      line-height: 1;
      transition: background var(--transition);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-family: 'Cormorant Garamond', serif;
      -webkit-tap-highlight-color: transparent;
    }
    .qty-ctrl button:hover { background: rgba(26,20,16,0.06); }
    .qty-ctrl button:active { background: rgba(26,20,16,0.12); }
    .qty-ctrl span {
      font-size: 16px; min-width: 38px;
      text-align: center; color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500; line-height: 1;
      border-left: 1px solid var(--cream-dark);
      border-right: 1px solid var(--cream-dark);
      height: 100%; display: flex; align-items: center; justify-content: center;
    }
    .add-btn {
      flex: 1;
      background: var(--ink); color: var(--cream);
      border: none; border-radius: 7px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px; letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer; transition: all var(--transition);
      display: flex; align-items: center; justify-content: center;
      gap: 8px; height: 50px;
      -webkit-font-smoothing: antialiased;
    }
    .add-btn:hover  { background: var(--ink-mid); }
    .add-btn:active { background: var(--ink-mid); transform: scale(0.98); }
    .add-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* QUICK / WA */
    .quick-btn {
      width: 100%; background: none; color: var(--ink);
      border: 1.5px solid var(--cream-dark); border-radius: 7px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: all var(--transition);
      height: 50px; display: flex; align-items: center;
      justify-content: center; gap: 8px; margin-bottom: 9px;
      -webkit-font-smoothing: antialiased;
    }
    .quick-btn:hover { border-color:var(--ink); background:rgba(26,20,16,0.03); }
    .quick-btn svg { width:15px; height:15px; }
    .wa-btn {
      width: 100%; background: none; color: #2E7D45;
      border: 1.5px solid rgba(46,125,69,0.3); border-radius: 7px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: all var(--transition);
      height: 50px; display: flex; align-items: center;
      justify-content: center; gap: 8px; text-decoration: none;
      margin-bottom: 9px;
      -webkit-font-smoothing: antialiased;
    }
    .wa-btn:hover { border-color:#2E7D45; background:rgba(46,125,69,0.04); }
    .wa-btn svg { width:17px; height:17px; }

    /* DELIVERY */
    .delivery-box { background:var(--cream-card); border:1px solid var(--cream-dark); border-radius:6px; padding:14px 16px; margin-top:16px; display:flex; align-items:center; gap:13px; }
    .delivery-icon { width:34px; height:34px; border-radius:6px; background:rgba(26,20,16,0.06); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .delivery-icon svg { width:16px; height:16px; color:var(--ink); }
    .delivery-label { font-size:11px; font-weight:600; color:var(--ink); font-family:'Cairo',sans-serif; }
    .delivery-val   { font-size:13px; color:var(--ink-soft); font-family:'Cormorant Garamond',serif; margin-top:1px; }

    /* HIGHLIGHTS */
    .highlights-box { margin-top:12px; background:var(--cream-card); border:1px solid var(--cream-dark); border-radius:6px; padding:14px 16px; }
    .highlights-title { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--ink); font-family:'Cairo',sans-serif; margin-bottom:10px; }
    .highlight-item { display:flex; align-items:center; gap:9px; padding:4px 0; font-size:13px; color:var(--ink-soft); font-family:'Cormorant Garamond',serif; }
    .highlight-dot  { width:5px; height:5px; border-radius:50%; background:var(--accent); flex-shrink:0; }

    /* OUT STOCK */
    .out-stock-bar { background:rgba(139,58,42,0.07); border:1px solid rgba(139,58,42,0.18); color:var(--danger); padding:10px 14px; font-size:11px; letter-spacing:2px; text-align:center; text-transform:uppercase; font-family:'Cairo',sans-serif; margin-bottom:13px; border-radius:var(--radius); }

    /* LOWER */
    .product-lower { max-width:1100px; margin:0 auto; padding:28px 26px 36px; border-top:1px solid var(--cream-dark); }
    @media(max-width:768px){ .product-lower { padding:22px 16px 28px; } }
    .desc-title { font-family:'Playfair Display',serif; font-size:17px; font-weight:400; color:var(--ink); margin-bottom:10px; }
    .desc-text  { font-size:15px; line-height:1.85; color:var(--ink-soft); }

    /* RELATED */
    .related-section { max-width:1100px; margin:0 auto; padding:28px 24px 60px; }
    .related-title { font-family:'Playfair Display',serif; font-size:21px; font-weight:400; color:var(--ink); margin-bottom:18px; }
    .related-grid  { display:grid; grid-template-columns:repeat(2,1fr); gap:2px; }
    @media(min-width:600px){ .related-grid { grid-template-columns:repeat(3,1fr); } }
    @media(min-width:900px){ .related-grid { grid-template-columns:repeat(4,1fr); } }

    /* SHAKE */
    @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-6px);} 40%{transform:translateX(6px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(4px);} }
    .shake { animation:shake 0.5s ease; }

    /* MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(26,20,16,0.6); z-index:3000; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity 0.25s ease; }
    @media(min-width:600px){ .modal-overlay { align-items:center; justify-content:center; } }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal { background:var(--parchment); width:100%; max-width:520px; padding:30px 22px 38px; position:relative; border-top:3px solid var(--accent); max-height:92vh; overflow-y:auto; transform:translateY(20px); transition:transform 0.25s ease; }
    @media(min-width:600px){ .modal { border-radius:4px; } }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal-close { position:absolute; top:12px; right:12px; background:none; border:none; color:var(--ink-soft); cursor:pointer; padding:6px; }
    .modal-close svg { width:20px; height:20px; }
    .modal-title { font-family:'Playfair Display',serif; font-size:19px; font-weight:400; color:var(--ink); margin-bottom:3px; }
    .modal-prod  { font-size:13px; color:var(--accent-deep); margin-bottom:20px; }
    .modal-grid  { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
    @media(max-width:460px){ .modal-grid { grid-template-columns:1fr; } }
    .modal-status { padding:10px; font-size:13px; text-align:center; margin-top:11px; display:none; border-radius:3px; }
    .modal-status.ok  { background:rgba(58,107,74,0.08); border:1px solid rgba(58,107,74,0.25); color:var(--success); display:block; }
    .modal-status.err { background:rgba(139,58,42,0.08); border:1px solid rgba(139,58,42,0.25); color:var(--danger);  display:block; }
  </style>
</head>
<body>
  <div id="main-nav"></div>

  <!-- MODAL commande rapide -->

      <button class="modal-close" id="modal-close-btn">

      </button>
      <div class="modal-title">Commande Rapide</div>

      <div class="modal-grid">

        </div>
        <div class="form-group">
          <label class="form-label">Téléphone *</label>
          <input type="tel" class="form-input" id="o-phone" placeholder="+216 XX XXX XXX"/>
        </div>
        <div class="form-group">
          <label class="form-label">Email *</label>
          <input type="email" class="form-input" id="o-email" placeholder="email@exemple.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">Gouvernorat *</label>
          <select class="form-input" id="o-gov">
            <option value="">Choisir...</option>
            <option>Tunis</option><option>Ariana</option><option>Ben Arous</option><option>Manouba</option>
            <option>Nabeul</option><option>Zaghouan</option><option>Bizerte</option><option>Béja</option>
            <option>Jendouba</option><option>Kef</option><option>Siliana</option><option>Sousse</option>
            <option>Monastir</option><option>Mahdia</option><option>Sfax</option><option>Kairouan</option>
            <option>Kasserine</option><option>Sidi Bouzid</option><option>Gabès</option><option>Médenine</option>
            <option>Tataouine</option><option>Gafsa</option><option>Tozeur</option><option>Kébili</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Adresse *</label>
          <input type="text" class="form-input" id="o-address" placeholder="Rue, ville..."/>
        </div>
        <div class="form-group">
          <label class="form-label">Taille *</label>
          <select class="form-input" id="o-size">
            <option value="">Choisir...</option>
            <option>XS</option><option>S</option><option>M</option>
            <option>L</option><option>XL</option><option>XXL</option>
          </select>
        </div>
        <div class="form-group">

      <button class="form-btn" id="send-btn" onclick="sendOrder()">Envoyer la commande</button>

    </div>
  </div>

  <main class="page product-page">
    <div id="product-root">
      <div class="loading" style="padding:120px 24px;"><div class="spinner"></div>Chargement...</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init('wmDB05phl0j3DmALP');</script>
  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/products.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    var currentProduct = null;
    var selectedSize   = '';
    var selectedColor  = '';
    var qty            = 1;
    var WHATSAPP       = '96672771';

    /* ─── INIT ─── */
    document.addEventListener('DOMContentLoaded', async function() {
      renderNav();

      document.getElementById('modal-close-btn').onclick = closeModal;
      document.getElementById('quick-modal').onclick = function(e) {
        if (e.target === document.getElementById('quick-modal')) closeModal();
      };

      var id = new URLSearchParams(window.location.search).get('id');
      if (!id) { window.location.href = '/index.html'; return; }
      try {
        currentProduct = await fetchProductById(id);
        document.title = currentProduct.title + ' — 7EBR';
        buildPage(currentProduct);
        loadRelated(currentProduct.category, currentProduct.id);
      } catch(e) {
        console.error(e);
        document.getElementById('product-root').innerHTML =
          '<div class="empty-state" style="padding:80px 24px;text-align:center;"><p style="color:var(--ink-faint);">Produit introuvable.</p></div>';
      }
    });

    /* ─── BUILD PAGE (no nested template literals) ─── */
    function buildPage(p) {
      var root = document.getElementById('product-root');
      root.innerHTML = '';

      /* BACK */
      var backBar = document.createElement('div');
      backBar.className = 'back-bar';
      backBar.innerHTML = '<a href="/index.html" class="back-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>Retour</a>';
      root.appendChild(backBar);

      /* BODY */
      var body = document.createElement('div');
      body.className = 'product-body';

      /* ── Gallery ── */
      var gallery = document.createElement('div');
      gallery.className = 'product-gallery';

      var mainDiv = document.createElement('div');
      mainDiv.className = 'gallery-main';

      if (p.badge) {
        var badgeEl = document.createElement('div');
        badgeEl.className = 'img-badge';
        badgeEl.textContent = p.badge;
        mainDiv.appendChild(badgeEl);
      }

      var images = (p.images && p.images.length) ? p.images : [];
      if (images.length > 0) {
        var mainImg = document.createElement('img');
        mainImg.id  = 'main-img';
        mainImg.src = images[0];
        mainImg.alt = p.title;
        mainDiv.appendChild(mainImg);
      } else {
        var ph = document.createElement('div');
        ph.className = 'gallery-placeholder';
        ph.innerHTML = placeholderSVG();
        mainDiv.appendChild(ph);
      }
      gallery.appendChild(mainDiv);

      if (images.length > 1) {
        var thumbs = document.createElement('div');
        thumbs.className = 'gallery-thumbs';
        images.forEach(function(src, i) {
          var t = document.createElement('div');
          t.className = 'gallery-thumb' + (i === 0 ? ' active' : '');
          t.dataset.idx = i;
          t.onclick = function() { switchImg(i); };
          var ti = document.createElement('img');
          ti.src = src; ti.alt = '';
          ti.onerror = function() { t.style.opacity = '0.2'; };
          t.appendChild(ti);
          thumbs.appendChild(t);
        });
        gallery.appendChild(thumbs);
      }
      body.appendChild(gallery);

      /* ── Info ── */
      var info = document.createElement('div');
      info.className = 'product-info';

      var catTag = document.createElement('div');
      catTag.className = 'product-cat-tag';
      catTag.textContent = p.category || 'Collection';
      info.appendChild(catTag);

      var nameEl = document.createElement('h1');
      nameEl.className = 'product-name-h1';
      nameEl.textContent = p.title;
      info.appendChild(nameEl);

      var priceRow = document.createElement('div');
      priceRow.className = 'price-row';
      if (p.old_price) {
        var oldPr = document.createElement('span');
        oldPr.className = 'price-old';
        oldPr.textContent = p.old_price + ' TND';
        priceRow.appendChild(oldPr);
      }
      var mainPr = document.createElement('span');
      mainPr.className = 'price-main';
      mainPr.textContent = p.price + ' TND';
      priceRow.appendChild(mainPr);
      info.appendChild(priceRow);

      if (!p.in_stock) {
        var oos = document.createElement('div');
        oos.className = 'out-stock-bar';
        oos.textContent = 'Rupture de stock';
        info.appendChild(oos);
      }

      if (p.in_stock) {
        var sep = document.createElement('div'); sep.className = 'info-sep'; info.appendChild(sep);

        /* Selection error */
        var selErr = document.createElement('div');
        selErr.id = 'sel-error'; selErr.className = 'sel-error';
        info.appendChild(selErr);

        /* SIZE */
        var sizeLbl = document.createElement('div'); sizeLbl.className = 'sel-label'; sizeLbl.textContent = 'Taille'; info.appendChild(sizeLbl);

    /* ─── Gallery ─── */
    function switchImg(idx) {
      var images = currentProduct && currentProduct.images ? currentProduct.images : [];
      var mainImg = document.getElementById('main-img');
      if (mainImg && images[idx]) {
        // Smooth fade
        mainImg.style.opacity = '0';
        setTimeout(function() {
          mainImg.src = images[idx];
          mainImg.onload = function() {
            mainImg.style.opacity = '1';
          };
        }, 150);
      }
      document.querySelectorAll('.gallery-thumb').forEach(function(t) {
        t.classList.toggle('active', parseInt(t.dataset.idx) === idx);
      });
    }

    /* ─── Selectors ─── */
    function selectSize(s) {
      selectedSize = s;
      document.querySelectorAll('.size-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.size === s);
      });
      clearSelErr();
    }
    function selectColor(c) {
      selectedColor = c;
      document.querySelectorAll('.color-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.color === c);
      });
      clearSelErr();

      // Switch images to this color's images
      switchImagesToColor(c);
    }

    function switchImagesToColor(color) {
      if (!currentProduct) return;

      var newImages = [];

      // Try color_images (JSONB): { "Noir": ["url1","url2"], "Blanc": ["url3"] }
      if (currentProduct.color_images && currentProduct.color_images[color]) {
        newImages = currentProduct.color_images[color];
      }
      // Fallback: filter images array by color name in URL or use all images
      if (!newImages.length && currentProduct.images && currentProduct.images.length) {
        // Try to find images that contain color name (lowercase)
        var colorLower = color.toLowerCase().replace(/\s/g, '');
        var filtered = currentProduct.images.filter(function(url) {
          return url.toLowerCase().indexOf(colorLower) !== -1;
        });
        newImages = filtered.length ? filtered : currentProduct.images;
      }

      if (!newImages.length) return;

      // Update main image with fade
      var mainImg = document.getElementById('main-img');
      var mainDiv = document.querySelector('.gallery-main');
      if (!mainImg && mainDiv) {
        // Was placeholder — create img
        mainDiv.innerHTML = '';
        mainImg = document.createElement('img');
        mainImg.id = 'main-img';
        mainImg.alt = currentProduct.title;
        mainDiv.appendChild(mainImg);
      }
      if (mainImg) {
        mainImg.style.opacity = '0';
        setTimeout(function() {
          mainImg.src = newImages[0];
          mainImg.onload = function() { mainImg.style.opacity = '1'; };
          mainImg.onerror = function() { mainImg.style.opacity = '1'; };
        }, 150);
      }

      // Rebuild thumbnails
      var thumbsEl = document.querySelector('.gallery-thumbs');
      if (newImages.length > 1) {
        if (!thumbsEl) {
          thumbsEl = document.createElement('div');
          thumbsEl.className = 'gallery-thumbs';
          var gallery = document.querySelector('.product-gallery');
          if (gallery) gallery.appendChild(thumbsEl);
        }
        thumbsEl.innerHTML = '';
        newImages.forEach(function(src, i) {
          var t = document.createElement('div');
          t.className = 'gallery-thumb' + (i === 0 ? ' active' : '');
          t.dataset.idx = i;
          t.onclick = function() { switchImgFromColor(src, t, thumbsEl); };
          var ti = document.createElement('img');
          ti.src = src; ti.alt = '';
          ti.onerror = function() { t.style.opacity = '0.2'; };
          t.appendChild(ti);
          thumbsEl.appendChild(t);
        });
      } else if (thumbsEl) {
        thumbsEl.innerHTML = '';
      }
    }

    function switchImgFromColor(src, thumbEl, thumbsContainer) {
      var mainImg = document.getElementById('main-img');
      if (mainImg) {
        mainImg.style.opacity = '0';
        setTimeout(function() {
          mainImg.src = src;
          mainImg.onload = function() { mainImg.style.opacity = '1'; };
          mainImg.onerror = function() { mainImg.style.opacity = '1'; };
        }, 150);
      }
      thumbsContainer.querySelectorAll('.gallery-thumb').forEach(function(t) {
        t.classList.remove('active');
      });
      if (thumbEl) thumbEl.classList.add('active');
    }
    function changeQty(d) {
      qty = Math.max(1, qty + d);
      var el = document.getElementById('qty-num');
      if (el) el.textContent = qty;
    }

    /* ─── Validation ─── */
    function validate() {
      var hasColors = currentProduct && currentProduct.colors && currentProduct.colors.length > 0;
      if (!selectedSize) {
        showSelErr('Veuillez choisir une taille.');
        document.querySelectorAll('.size-btn').forEach(function(b){ b.classList.add('shake'); });
        setTimeout(function(){ document.querySelectorAll('.size-btn').forEach(function(b){ b.classList.remove('shake'); }); }, 600);
        return false;
      }
      if (hasColors && !selectedColor) {
        showSelErr('Veuillez choisir une couleur.');
        document.querySelectorAll('.color-btn').forEach(function(b){ b.classList.add('shake'); });
        setTimeout(function(){ document.querySelectorAll('.color-btn').forEach(function(b){ b.classList.remove('shake'); }); }, 600);
        return false;
      }
      clearSelErr();
      return true;
    }
    function showSelErr(msg) {
      var el = document.getElementById('sel-error');
      if (el) { el.textContent = msg; el.classList.add('show'); }
    }
    function clearSelErr() {
      var el = document.getElementById('sel-error');
      if (el) el.classList.remove('show');
    }

    /* ─── Cart ─── */
    function handleAddToCart() {
      if (!validate()) return;
      for (var i = 0; i < qty; i++) addToCart(currentProduct, selectedSize, selectedColor);
      openCart();
    }

    /* ─── Modal ─── */
    function openModal() {
      if (!validate()) return;
      document.getElementById('modal-prod-name').textContent = currentProduct ? currentProduct.title : '';
      document.getElementById('o-size').value  = selectedSize  || '';
      document.getElementById('o-color').value = selectedColor || '';
      document.getElementById('quick-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      document.getElementById('quick-modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    /* ─── Send order ─── */
    async function sendOrder() {
      var first   = document.getElementById('o-first').value.trim();
      var last    = document.getElementById('o-last').value.trim();
      var phone   = document.getElementById('o-phone').value.trim();
      var email   = document.getElementById('o-email').value.trim();
      var gov     = document.getElementById('o-gov').value;
      var address = document.getElementById('o-address').value.trim();
      var size    = document.getElementById('o-size').value;
      var color   = document.getElementById('o-color').value.trim();
      var statusEl = document.getElementById('modal-status');
      var hasColors = currentProduct && currentProduct.colors && currentProduct.colors.length > 0;

      statusEl.className = 'modal-status';

      if (!first || !last || !phone || !email || !gov || !address) {
        statusEl.className = 'modal-status err';
        statusEl.textContent = 'Veuillez remplir tous les champs obligatoires.';
        return;
      }
      if (!size) {
        statusEl.className = 'modal-status err';
        statusEl.textContent = 'Veuillez choisir une taille.';
        return;
      }
      if (hasColors && !color) {
        statusEl.className = 'modal-status err';
        statusEl.textContent = 'Veuillez choisir une couleur.';
        return;
      }

      var btn = document.getElementById('send-btn');
      btn.disabled = true; btn.textContent = 'Envoi en cours...';

      var customerName = first + ' ' + last;
      var fullAddress  = address + ', ' + gov;

      try {
        /* 1 — Supabase */
        var user = await getUser();
        await sb.from('orders').insert([{
          user_id:        user ? user.id : null,
          product_id:     currentProduct ? currentProduct.id : null,
          product_title:  (currentProduct ? currentProduct.title : '') + ' — ' + size + (color ? ' — ' + color : ''),
          amount:         currentProduct ? currentProduct.price : 0,
          status:         'pending',
          customer_name:  customerName,
          customer_email: email,
          customer_phone: phone,
          address:        fullAddress,
          payment_method: 'cod'
        }]);

        /* 2 — EmailJS */
        await emailjs.send('service_lixuoem', 'template_y0aocqa', {
          customer_name:    customerName,
          customer_phone:   phone,
          customer_email:   email,
          customer_city:    gov,
          customer_address: address,
          product_name:     currentProduct ? currentProduct.title : '',
          product_price:    (currentProduct ? currentProduct.price : 0) + ' TND',
          product_size:     size,
          product_color:    color || 'Non spécifié',
          product_qty:      String(qty),
          to_email:         'admin@7ebr.com'
        });

        statusEl.className = 'modal-status ok';
        statusEl.textContent = 'Commande envoyée! Nous vous contacterons bientôt.';
        ['o-first','o-last','o-phone','o-email','o-gov','o-address','o-size','o-color'].forEach(function(id) {
          var el = document.getElementById(id); if (el) el.value = '';
        });
      } catch(err) {
        console.error(err);
        statusEl.className = 'modal-status err';
        statusEl.textContent = 'Erreur d\'envoi. Contactez-nous sur WhatsApp.';
      } finally {
        btn.disabled = false; btn.textContent = 'Envoyer la commande';
      }
    }

    /* ─── Related ─── */
    async function loadRelated(category, excludeId) {
      try {
        var all  = await fetchProducts({ category: category });
        var grid = document.getElementById('related-grid');
        if (!grid) return;
        var related = all.filter(function(p){ return p.id != excludeId; }).slice(0, 4);
        grid.innerHTML = related.length
          ? related.map(renderProductCard).join('')
          : '<p style="color:var(--ink-faint);font-size:13px;grid-column:1/-1;padding:20px 0;">Aucun produit similaire.</p>';
      } catch(e) { console.error(e); }
    }

    }
