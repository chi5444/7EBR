<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Produit — 7EBR</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .product-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 24px 100px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: start;
    }
    @media (max-width: 768px) {
      .product-page { grid-template-columns: 1fr; gap: 32px; padding: 32px 16px 80px; }
    }

    /* IMAGE */
    .product-gallery { position: sticky; top: calc(var(--nav-h) + 24px); }
    .product-main-img {
      aspect-ratio: 3/4;
      background: var(--bg2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .product-main-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-main-img .placeholder-svg { width: 60%; height: 60%; opacity: 0.3; }
    .product-badge-big {
      position: absolute;
      top: 16px; left: 16px;
      background: var(--ink);
      color: var(--bg);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 12px;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
    }

    /* INFO */
    .product-info { padding-top: 8px; }
    .product-category {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-bottom: 12px;
      font-family: 'Cairo', sans-serif;
    }
    .product-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 16px;
    }
    .product-prices {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 8px;
    }
    .product-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      color: var(--ink);
    }
    .product-old-price {
      font-size: 20px;
      color: var(--text-faint);
      text-decoration: line-through;
    }
    .product-divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }
    .product-desc {
      font-size: 15px;
      line-height: 1.9;
      color: var(--text-dim);
      margin-bottom: 28px;
    }

    /* COLOR SELECTOR */
    .color-label, .size-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
      font-family: 'Cairo', sans-serif;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .color-selected-name { color: var(--ink); font-weight: 600; }
    .color-grid {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .color-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      position: relative;
      transition: all var(--transition);
      outline: none;
    }
    .color-btn:hover { transform: scale(1.1); }
    .color-btn.selected {
      border-color: var(--ink);
      box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--ink);
    }
    .color-btn[data-color="Noir"] { background: #111; }
    .color-btn[data-color="Blanc"] { background: #f5f5f5; border-color: rgba(255,255,255,0.3); }
    .color-btn[data-color="Marron"] { background: #6B3A2A; }
    .color-btn[data-color="Beige"] { background: #C4A882; }
    .color-btn[data-color="Kaki"] { background: #7A7A52; }
    .color-btn[data-color="Gris"] { background: #888; }
    .color-btn[data-color="Bleu"] { background: #2A4A7F; }
    .color-btn[data-color="Vert"] { background: #2D5A27; }
    .color-btn[data-color="Bordeaux"] { background: #6B1A2A; }
    .color-btn[data-color="Camel"] { background: #C19A6B; }

    /* SIZE SELECTOR */
    .size-grid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .size-btn {
      min-width: 52px; height: 52px;
      padding: 0 14px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .size-btn:hover { border-color: var(--ink); color: var(--ink); }
    .size-btn.selected { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    /* ACTION BUTTONS */
    .action-buttons { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
    .btn-primary {
      width: 100%;
      background: var(--ink);
      color: var(--bg);
      border: none;
      padding: 18px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-primary:hover { background: var(--ink-light); }
    .btn-primary svg { width: 18px; height: 18px; }

    .btn-secondary {
      width: 100%;
      background: none;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 16px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
    }
    .btn-secondary:hover { border-color: var(--ink); color: var(--ink); }
    .btn-secondary svg { width: 18px; height: 18px; }

    .btn-whatsapp {
      border-color: rgba(37, 211, 102, 0.4);
      color: #25d366;
    }
    .btn-whatsapp:hover { border-color: #25d366; background: rgba(37,211,102,0.05); }

    /* PRODUCT META */
    .product-meta {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 20px 0;
      border-top: 1px solid var(--border);
    }
    .meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .meta-row svg { width: 16px; height: 16px; color: var(--ink-dim); flex-shrink: 0; }

    /* QUICK ORDER MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 460px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    .modal::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--ink), transparent);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 28px 0;
      margin-bottom: 20px;
    }
    .modal-header h3 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 400;
    }
    .modal-close {
      background: none; border: none;
      cursor: pointer;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      transition: color var(--transition);
    }
    .modal-close:hover { color: var(--text); }
    .modal-close svg { width: 20px; height: 20px; }
    .modal-product-ref {
      margin: 0 28px 20px;
      padding: 12px 16px;
      background: var(--bg3);
      border-left: 2px solid var(--ink);
      font-size: 13px;
      color: var(--ink-dim);
    }
    .modal-body { padding: 0 28px 28px; }
    .modal-body .form-group { margin-bottom: 14px; }

    .modal-status {
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
      border-radius: var(--radius);
    }
    .modal-status.success {
      display: block;
      background: rgba(39,174,96,0.1);
      border: 1px solid rgba(39,174,96,0.3);
      color: #2ecc71;
    }
    .modal-status.error {
      display: block;
      background: rgba(192,57,43,0.1);
      border: 1px solid rgba(192,57,43,0.3);
      color: #e74c3c;
    }

    /* SOCIAL LINKS */
    .social-links {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .social-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 1px;
      font-family: 'Cairo', sans-serif;
      transition: all var(--transition);
    }
    .social-link:hover { border-color: var(--ink); color: var(--ink); }
    .social-link svg { width: 14px; height: 14px; }

    .out-of-stock-banner {
      background: rgba(192,57,43,0.1);
      border: 1px solid rgba(192,57,43,0.3);
      color: #e74c3c;
      padding: 10px 14px;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      font-family: 'Cairo', sans-serif;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div id="main-nav"></div>
  <main class="page">
    <div id="product-content">
      <div class="loading" style="padding:120px 24px;">
        <div class="spinner"></div>
        Chargement...
      </div>
    </div>

    <!-- QUICK ORDER MODAL -->
    <div class="modal-overlay" id="quick-order-modal">
      <div class="modal">
        <div class="modal-header">
          <h3>Commander — <em style="color:var(--ink); font-style:italic" id="modal-product-name"></em></h3>
          <button class="modal-close" onclick="closeModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-product-ref" id="modal-product-ref">—</div>
        <div class="modal-body">
          <div id="modal-status" class="modal-status"></div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Prénom *</label>
              <input type="text" class="form-input" id="order-firstname" placeholder="Prénom"/>
            </div>
            <div class="form-group">
              <label class="form-label">Nom *</label>
              <input type="text" class="form-input" id="order-lastname" placeholder="Nom"/>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Téléphone *</label>
            <input type="tel" class="form-input" id="order-phone" placeholder="+216 XX XXX XXX"/>
          </div>
          <div class="form-group">
            <label class="form-label">Email *</label>
            <input type="email" class="form-input" id="order-email" placeholder="votre@email.com"/>
          </div>
          <div class="form-group">
            <label class="form-label">Adresse *</label>
            <input type="text" class="form-input" id="order-address" placeholder="Rue, numéro..."/>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Ville *</label>
              <input type="text" class="form-input" id="order-city" placeholder="Ville"/>
            </div>
            <div class="form-group">
              <label class="form-label">Gouvernorat *</label>
              <select class="form-input" id="order-gov">
                <option value="">Choisir...</option>
                <option>Tunis</option><option>Sfax</option><option>Sousse</option>
                <option>Bizerte</option><option>Gabès</option><option>Ariana</option>
                <option>Gafsa</option><option>Monastir</option><option>Nabeul</option>
                <option>Kairouan</option><option>Ben Arous</option><option>Kasserine</option>
                <option>Médenine</option><option>Jendouba</option><option>Mahdia</option>
                <option>Sidi Bouzid</option><option>Kef</option><option>Tataouine</option>
                <option>Béja</option><option>Kébili</option><option>Siliana</option>
                <option>Tozeur</option><option>Zaghouan</option><option>Manouba</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Taille *</label>
              <select class="form-input" id="order-size">
                <option value="">Choisir...</option>
                <option>XS</option><option>S</option><option>M</option>
                <option>L</option><option>XL</option><option>XXL</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Couleur</label>
              <input type="text" class="form-input" id="order-color" placeholder="Ex: Noir, Blanc..."/>
            </div>
          </div>
          <button class="form-btn" id="send-order-btn" onclick="sendQuickOrder()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:16px;height:16px;vertical-align:middle;margin-right:8px"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Envoyer la commande
          </button>
        </div>
      </div>
    </div>

    <footer class="footer" style="margin-top:0">
      <div class="footer-bottom" style="max-width:1100px; margin:0 auto; padding:24px;">
        <span>© 2025 7EBR. Tous droits réservés.</span>
        <span>Fait avec passion en Tunisie</span>
      </div>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    emailjs.init('wmDB05phl0j3DmALP');
  </script>
  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/products.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    let currentProduct = null;
    let selectedSize = '';
    let selectedColor = '';

    const WHATSAPP_NUMBER = '21696672771';
    const AVAILABLE_COLORS = ['Noir','Blanc','Marron','Beige','Kaki','Gris','Bleu','Vert','Bordeaux','Camel'];

    document.addEventListener('DOMContentLoaded', async () => {
      renderNav();
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) { window.location.href = '/index.html'; return; }

      try {
        currentProduct = await fetchProductById(id);
        renderProduct(currentProduct);
        document.title = `${currentProduct.title} — 7EBR`;
      } catch (e) {
        document.getElementById('product-content').innerHTML = `
          <div class="empty-state" style="padding:120px 24px">
            <p>Produit introuvable.</p>
          </div>`;
      }
    });

    function renderProduct(p) {
      const container = document.getElementById('product-content');
      const badge = p.badge ? `<div class="product-badge-big">${p.badge}</div>` : '';
      const oldPrice = p.old_price ? `<span class="product-old-price">${p.old_price} TND</span>` : '';

      // Build colors from product or default
      const colors = p.colors ? p.colors : AVAILABLE_COLORS;
      const colorBtns = colors.map(c => `<button class="color-btn" data-color="${c}" title="${c}" onclick="selectColor('${c}')"></button>`).join('');

      container.innerHTML = `
        <div class="product-page">
          <!-- GALLERY -->
          <div class="product-gallery">
            <div class="product-main-img">
              ${badge}
              ${p.image_url
                ? `<img src="${p.image_url}" alt="${p.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                : ''}
              <svg class="placeholder-svg" style="${p.image_url ? 'display:none' : ''}" viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="120" height="160" fill="#1a1a1a"/>
                <path d="M30 120 L60 40 L90 120 Z" stroke="#C4A882" stroke-width="1" fill="none" opacity="0.4"/>
                <circle cx="60" cy="36" r="6" fill="none" stroke="#C4A882" stroke-width="1" opacity="0.4"/>
                <text x="60" y="148" font-family="serif" font-size="10" fill="#C4A882" text-anchor="middle" opacity="0.3">7EBR</text>
              </svg>
            </div>
          </div>

          <!-- INFO -->
          <div class="product-info">
            <div class="product-category">${p.category || 'Collection'}</div>
            <h1 class="product-name">${p.title}</h1>
            <div class="product-prices">
              ${oldPrice}
              <span class="product-price">${p.price} TND</span>
            </div>
            <div class="meta-row" style="margin-bottom:20px;font-size:12px;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
              Livraison 8 DT dans toute la Tunisie
            </div>

            ${!p.in_stock ? `<div class="out-of-stock-banner">Rupture de stock</div>` : ''}

            <div class="product-divider"></div>
            <p class="product-desc">
              ${p.description || `Pièce exclusive de la collection 7EBR, inspirée de la calligraphie islamique traditionnelle. Chaque vêtement est une œuvre d'art portée avec fierté. Coupe moderne, tissu premium, finition soignée.`}
            </p>

            <!-- COLOR SELECTOR -->
            <div class="color-label">Couleur <span class="color-selected-name" id="color-selected-display"></span></div>
            <div class="color-grid">${colorBtns}</div>

            <!-- SIZE SELECTOR -->
            <div class="size-label">Taille</div>
            <div class="size-grid">
              ${['XS','S','M','L','XL','XXL'].map(s => `
                <button class="size-btn" data-size="${s}" onclick="selectSize('${s}')">${s}</button>
              `).join('')}
            </div>

            <!-- ACTIONS -->
            ${p.in_stock ? `
            <div class="action-buttons">
              <button class="btn-primary" onclick="handleAddToCart()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                Ajouter au panier
              </button>
              <button class="btn-secondary" onclick="openQuickOrder()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                Commande rapide (Email)
              </button>
              <a class="btn-secondary btn-whatsapp" href="${buildWhatsApp(p)}" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="width:18px;height:18px">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
                  <path d="M11.999 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.167L2 22l4.985-1.399A9.953 9.953 0 0 0 12 22c5.523 0 10-4.477 10-10S17.523 2 11.999 2zm.001 18a7.962 7.962 0 0 1-4.064-1.112l-.292-.173-3.017.847.857-2.94-.191-.302A7.947 7.947 0 0 1 4 12c0-4.411 3.589-8 8-8s8 3.589 8 8-3.588 8-8 8z"/>
                </svg>
                Commander sur WhatsApp
              </a>
            </div>
            ` : `<div class="out-of-stock-banner">Ce produit est actuellement épuisé</div>`}

            <!-- META -->
            <div class="product-meta">
              <div class="meta-row">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                Livraison 8 DT — partout en Tunisie
              </div>
              <div class="meta-row">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Paiement à la livraison uniquement
              </div>
              <div class="meta-row">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                Échange facile sous 7 jours
              </div>
            </div>

            <!-- SOCIAL -->
            <div class="social-links">
              <a class="social-link" href="https://wa.me/21696672771" target="_blank">

    function selectSize(s) {
      selectedSize = s;
      document.querySelectorAll('.size-btn').forEach(b => {
        b.classList.toggle('selected', b.dataset.size === s);
      });
    }

    function selectColor(c) {
      selectedColor = c;
      document.querySelectorAll('.color-btn').forEach(b => {
        b.classList.toggle('selected', b.dataset.color === c);
      });
      const display = document.getElementById('color-selected-display');
      if (display) display.textContent = '— ' + c;
    }

    function handleAddToCart() {
      if (!selectedSize) {
        alert('Veuillez choisir une taille.');
        return;
      }
      addToCart(currentProduct, selectedSize);
      openCart();
    }

    function buildWhatsApp(p) {
      const msg = encodeURIComponent(`Bonjour 7EBR, je voudrais commander:\n*${p.title}*\nPrix: ${p.price} TND\nLivraison: 8 DT\n\nTaille: \nCouleur: \nNom: \nTéléphone: \nAdresse: `);
      return `https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`;
    }

    function openQuickOrder() {
      document.getElementById('modal-product-name').textContent = currentProduct?.title || '';
      document.getElementById('modal-product-ref').textContent = `${currentProduct?.title} — ${currentProduct?.price} TND + 8 DT livraison`;
      document.getElementById('quick-order-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('quick-order-modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    async function sendQuickOrder() {
      const firstname = document.getElementById('order-firstname').value.trim();
      const lastname = document.getElementById('order-lastname').value.trim();
      const phone = document.getElementById('order-phone').value.trim();
      const email = document.getElementById('order-email').value.trim();
      const address = document.getElementById('order-address').value.trim();
      const city = document.getElementById('order-city').value.trim();
      const gov = document.getElementById('order-gov').value;
      const size = document.getElementById('order-size').value;
      const color = document.getElementById('order-color').value.trim();
      const statusEl = document.getElementById('modal-status');

      if (!firstname || !lastname || !phone || !email || !address || !city || !gov || !size) {
        statusEl.className = 'modal-status error';
        statusEl.textContent = 'Veuillez remplir tous les champs obligatoires.';
        return;
      }

      const btn = document.getElementById('send-order-btn');
      btn.disabled = true;
      btn.textContent = 'Envoi en cours...';
      statusEl.className = 'modal-status';

      const totalPrice = currentProduct ? (parseFloat(currentProduct.price) + 8).toFixed(3) + ' TND (+ 8 DT livraison)' : '';

      try {
        await emailjs.send('service_lixuoem', 'template_y0aocqa', {
          customer_name: firstname + ' ' + lastname,
          customer_firstname: firstname,
          customer_lastname: lastname,
          customer_phone: phone,
          customer_email: email,
          customer_address: address,
          customer_city: city,
          customer_gov: gov,
          product_name: currentProduct?.title || '',
          product_price: currentProduct?.price + ' TND' || '',
          product_size: size,
          product_color: color || 'Non précisé',
          total_price: totalPrice,
          to_email: 'admin@7ebr.com'
        });

        statusEl.className = 'modal-status success';
        statusEl.textContent = '✓ Commande envoyée! Nous vous contacterons bientôt.';
        ['order-firstname','order-lastname','order-phone','order-email','order-address','order-city','order-gov','order-size','order-color'].forEach(id => {
          document.getElementById(id).value = '';
        });
      } catch (err) {
        statusEl.className = 'modal-status error';
        statusEl.textContent = 'Erreur d\'envoi. Contactez-nous sur WhatsApp.';
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:16px;height:16px;vertical-align:middle;margin-right:8px"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Envoyer la commande`;
      }
    }

    document.getElementById('quick-order-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('quick-order-modal')) closeModal();
    });
  </script>
