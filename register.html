<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Créer un compte — 7EBR</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <div id="main-nav"></div>
  <div class="page form-page">
    <div class="form-card">
      <div class="form-logo">
        <img src="/logo.jpeg" alt="7EBR" onerror="this.style.display='none';document.getElementById('rt').style.display='block'">
        <div id="rt" class="form-logo-text" style="display:none">7EBR</div>
      </div>
      <h1 class="form-title">Créer un compte</h1>
      <p class="form-subtitle">Rejoignez la communauté 7EBR</p>
      <div class="form-error"  id="reg-err"></div>
      <div class="form-success" id="reg-ok"></div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="reg-email" placeholder="votre@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-input" id="reg-pw" placeholder="Minimum 6 caractères" autocomplete="new-password"/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmer le mot de passe</label>
        <input type="password" class="form-input" id="reg-pw2" placeholder="Répéter le mot de passe" autocomplete="new-password"/>
      </div>
      <button class="form-btn" id="reg-btn" onclick="handleRegister()">Créer mon compte</button>
      <div class="form-footer">
        Déjà un compte ? <a href="/login.html">Se connecter</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      renderNav();
      const user = await getUser();
      if (user) window.location.href = '/index.html';
    });

    async function handleRegister() {
      const email = document.getElementById('reg-email').value.trim();
      const pw    = document.getElementById('reg-pw').value;
      const pw2   = document.getElementById('reg-pw2').value;
      const err   = document.getElementById('reg-err');
      const ok    = document.getElementById('reg-ok');
      const btn   = document.getElementById('reg-btn');
      err.classList.remove('show'); ok.classList.remove('show');

      if (!email || !pw || !pw2) {
        err.textContent = 'Veuillez remplir tous les champs.';
        err.classList.add('show'); return;
      }
      if (pw.length < 6) {
        err.textContent = 'Le mot de passe doit contenir au moins 6 caractères.';
        err.classList.add('show'); return;
      }
      if (pw !== pw2) {
        err.textContent = 'Les mots de passe ne correspondent pas.';
        err.classList.add('show'); return;
      }
      btn.disabled = true; btn.textContent = 'Création...';
      try {
        await register(email, pw);
        ok.textContent = 'Compte créé avec succès! Redirection...';
        ok.classList.add('show');
        setTimeout(() => window.location.href = '/index.html', 1200);
      } catch(e) {
        err.textContent = e.message?.includes('already registered')
          ? 'Cet email est déjà utilisé.'
          : 'Erreur lors de la création. Réessayez.';
        err.classList.add('show');
        btn.disabled = false; btn.textContent = 'Créer mon compte';
      }
    }
  </script>
</body>
</html>
