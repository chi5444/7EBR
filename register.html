<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Créer un compte — 7EBR</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <div id="main-nav"></div>
  <div class="page form-page">
    <div class="form-card">
      <div class="form-logo">
        <img src="/logo.jpeg" alt="7EBR" onerror="this.style.display='none';document.getElementById('logo-text').style.display='block'">
        <div id="logo-text" class="form-logo-text" style="display:none">7EBR</div>
      </div>

      <h1 class="form-title">Créer un compte</h1>
      <p class="form-subtitle">Rejoignez la communauté 7EBR</p>

      <div class="form-error" id="reg-error"></div>
      <div class="form-success" id="reg-success"></div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="reg-email" placeholder="votre@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-input" id="reg-password" placeholder="Minimum 6 caractères" autocomplete="new-password"/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmer le mot de passe</label>
        <input type="password" class="form-input" id="reg-confirm" placeholder="Répéter le mot de passe" autocomplete="new-password"/>
      </div>

      <button class="form-btn" id="reg-btn" onclick="handleRegister()">Créer mon compte</button>

      <div class="form-footer">
        Déjà un compte ?
        <a href="/login.html">Se connecter</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      renderNav();
      const user = await getUser();
      if (user) window.location.href = '/index.html';
    });

    async function handleRegister() {
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;
      const btn = document.getElementById('reg-btn');
      const errEl = document.getElementById('reg-error');
      const sucEl = document.getElementById('reg-success');

      errEl.classList.remove('show');
      sucEl.classList.remove('show');

      if (!email || !password || !confirm) {
        errEl.textContent = 'Veuillez remplir tous les champs.';
        errEl.classList.add('show'); return;
      }
      if (password.length < 6) {
        errEl.textContent = 'Le mot de passe doit contenir au moins 6 caractères.';
        errEl.classList.add('show'); return;
      }
      if (password !== confirm) {
        errEl.textContent = 'Les mots de passe ne correspondent pas.';
        errEl.classList.add('show'); return;
      }

      btn.disabled = true;
      btn.textContent = 'Création en cours...';

      try {
        await register(email, password);
        sucEl.textContent = 'Compte créé avec succès! Redirection...';
        sucEl.classList.add('show');
        setTimeout(() => window.location.href = '/index.html', 1200);
      } catch (err) {
        const msg = err.message?.includes('already registered')
          ? 'Cet email est déjà utilisé.'
          : 'Erreur lors de la création. Réessayez.';
        errEl.textContent = msg;
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Créer mon compte';
      }
    }
  </script>
</body>
</html>
